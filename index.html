<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Professional Login</title>
    <!-- Boxicons CDN (Eye Icon and Locks ke liye) -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="login-card">
        <header class="card-header">
            <div class="brand-logo">
                <i class='bx bxs-shield-alt-2'></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Please enter your credentials to access your account.</p>
        </header>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- Username Input Group -->
            <div class="input-field">
                <label for="username">Username or Email</label>
                <div class="input-wrapper">
                    <i class='bx bx-user icon'></i>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="e.g. alex_dev" 
                        required 
                        autocomplete="username"
                    >
                </div>
            </div>

            <!-- Password Input Group -->
            <div class="input-field">
                <div class="label-row">
                    <label for="password">Password</label>
                    <a href="#" class="forgot-pass">Forgot?</a>
                </div>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt icon'></i>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="current-password"
                    >
                    <i class='bx bx-hide toggle-eye' id="togglePassword"></i>
                </div>
            </div>

            <!-- Remember & Options -->
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember">
                    <span class="checkmark"></span>
                    Remember me for 30 days
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Sign In</span>
                <i class='bx bx-right-arrow-alt'></i>
            </button>
        </form>

        <footer class="card-footer">
            <p>Don't have an account? <a href="#">Create account</a></p>
        </footer>
    </main>

    <script>
        // Password Visibility Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            
            togglePassword.classList.toggle('bx-hide', !isPassword);
            togglePassword.classList.toggle('bx-show', isPassword);
        });

        // Form Submit Handler
        function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const username = document.getElementById('username').value;
            
            // Subtle loading state animation
            btn.classList.add('loading');
            btn.disabled = true;
            
            setTimeout(() => {
                alert(`Welcome back, ${username}! Login successful.`);
                btn.classList.remove('loading');
                btn.disabled = false;
            }, 800);
        }
    </script>

</body>
</html>
